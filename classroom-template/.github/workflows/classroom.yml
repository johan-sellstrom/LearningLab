# GitHub Classroom autograding workflow.
# This runs the same lab checks students can run locally, but in CI to provide
# a trusted "pass/fail" signal for GitHub Classroom and the course unlocks.
name: Classroom Autograding

on:
  # Manual trigger for instructors (useful for debugging or rerunning a lab).
  workflow_dispatch:
    inputs:
      lab_id:
        # Optional override for which lab to grade. If omitted, lab-check.js will
        # infer from the branch name or use the LAB_ID repo variable.
        description: "Optional lab ID (00-05). If omitted, derived from branch name or LAB_ID variable."
        required: false
        type: string
  push:
    # Run on main to validate baseline content, and on lab-* branches so each
    # lab can be graded independently as students work through the sequence.
    branches:
      - main
      - lab-*
  pull_request:
    # PRs are included so instructors can preview changes to labs/workflow.
    branches:
      - main
      - lab-*

jobs:
  autograde:
    # ubuntu-latest is used for consistency with GitHub Classroom runners and
    # for fast, cached setup of Node + pnpm.
    runs-on: ubuntu-latest
    # Hard stop so a stuck process does not burn CI minutes.
    timeout-minutes: 20
    env:
      # CI=true helps downstream tooling (pnpm/node) run in non-interactive mode.
      CI: true
      # LAB_ID is optional. If present, it forces which lab to grade. If absent,
      # lab-check.js will infer from branch name (lab-01-*) or default to 01.
      LAB_ID: ${{ inputs.lab_id || vars.LAB_ID }}
    steps:
      - name: Checkout
        # Pull the student's submission so the lab code is graded as submitted.
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Use the pinned pnpm version from packageManager to avoid lockfile drift.
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: Setup Node
        # Node 20 matches the repo's documented requirement and avoids
        # differences in crypto/HTTP behavior across versions.
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        # Use the lockfile to ensure deterministic installs for grading.
        run: pnpm install -r --frozen-lockfile

      - name: Run lab checks
        # --start ensures issuer/verifier services are started in CI.
        # --verbose makes failures easier to debug in Classroom logs.
        run: pnpm lab:check -- --start --verbose
